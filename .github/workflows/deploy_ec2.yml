name: Deploy to EC2

on:
  push:
    branches:
      - feature/測試CICD

jobs:
  Build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout 程式碼
        uses: actions/checkout@v4

      - name: 設定 Node.js 環境
        uses: actions/setup-node@v3
        with:
          node-version: '22.x'

      - name: 安裝相依套件
        run: npm ci

      - name: 建置 NestJS 應用程式
        run: npm run build

      - name: 登入 Docker Hub
        run: echo "${{ secrets.DOCKERHUB_PASSWORD }}" | docker login -u "${{ secrets.DOCKERHUB_USERNAME }}" --password-stdin

      - name: 建置 Docker 映像檔
        run: docker build -t ${{ secrets.DOCKERHUB_USERNAME }}/stock-bot-api:latest .

      - name: 推送 Docker 映像檔至 Docker Hub
        run: docker push ${{ secrets.DOCKERHUB_USERNAME }}/stock-bot-api:latest

  Deploy:
    needs: Build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout 程式碼
        uses: actions/checkout@v4

      - name: 準備部署封包
        run: |
          mkdir -p artifacts
          # 只需要 docker-compose 檔案（若有其他部署需要的設定檔也可複製）
          cp docker-compose.yml artifacts/
          
      - name: 壓縮部署封包
        run: tar -czf deploy.tar.gz -C artifacts .

      - name: 上傳部署封包至 EC2
        uses: appleboy/scp-action@master
        with:
          host: ${{ secrets.HOST_DNS }}
          username: ${{ secrets.USERNAME }}
          key: ${{ secrets.EC2_SSH_KEY }}
          source: "deploy.tar.gz"
          target: "~/"

      - name: 執行遠端 SSH 指令
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.HOST_DNS }}
          username: ${{ secrets.USERNAME }}
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            mkdir -p ~/deploy
            tar -xzf ~/deploy.tar.gz -C ~/deploy
            cd ~/deploy

            echo "建立 .env 檔案..."
            cat > .env <<EOL
            DB_USER=${{ secrets.DB_USER }}
            DB_PASSWORD=${{ secrets.DB_PASSWORD }}
            DB_NAME=stock_bot
            CHANNEL_ACCESS_TOKEN=${{ secrets.CHANNEL_ACCESS_TOKEN }}
            CHANNEL_SECRET=${{ secrets.CHANNEL_SECRET }}
            TELEGRAM_BOT_TOKEN=${{ secrets.TELEGRAM_BOT_TOKEN }}
            TELEGRAM_BOT_WEBHOOK_DOMAIN=${{ secrets.TELEGRAM_BOT_WEBHOOK_DOMAIN }}
            TELEGRAM_BOT_WEBHOOK_PATH=${{ secrets.TELEGRAM_BOT_WEBHOOK_PATH }}
            TELEGRAM_BOT_SECRET_TOKEN=${{ secrets.TELEGRAM_BOT_SECRET_TOKEN }}
            IMGUR_CLIENT_ID=${{ secrets.IMGUR_CLIENT_ID }}
            EOL

            echo "檢查並清理 3000 埠口的容器..."
            CONTAINERS_USING_PORT=$(sudo docker ps -q --filter "publish=3000")
            if [ ! -z "$CONTAINERS_USING_PORT" ]; then
              echo "停止使用 3000 埠口的容器..."
              sudo docker stop $CONTAINERS_USING_PORT
              sudo docker rm $CONTAINERS_USING_PORT
            fi

            echo "使用 docker-compose 拉取最新映像檔並啟動容器..."
            sudo docker-compose --env-file .env down
            sudo docker-compose --env-file .env pull
            sudo docker-compose --env-file .env up -d

            echo "驗證容器狀態..."
            if ! sudo docker ps | grep -q "stock-bot-api"; then
              echo "容器啟動失敗"
              sudo docker-compose logs
              exit 1
            fi

            echo "容器成功啟動"
            sudo docker ps | grep "stock-bot"
            
            echo "清除未使用的映像檔..."
            sudo docker image prune -f || echo "清除未使用的映像檔失敗"
