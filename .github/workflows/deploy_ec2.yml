name: Deploy to EC2

on:
  push:
    branches:
      - feature/測試CICD

jobs:
  Build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout 程式碼
        uses: actions/checkout@v4

      - name: 設定 Node.js 環境
        uses: actions/setup-node@v3
        with:
          node-version: '22.x'

      - name: 安裝相依套件
        run: npm ci

      - name: 建置 NestJS 應用程式
        run: npm run build

  Push:
    needs: Build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout 程式碼
        uses: actions/checkout@v4

      - name: 登入 Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_HUB_USERNAME }}
          password: ${{ secrets.DOCKER_HUB_ACCESS_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ${{ secrets.DOCKER_HUB_USERNAME }}/stock-bot:latest
          cache-from: type=registry,ref=${{ secrets.DOCKER_HUB_USERNAME }}/stock-bot:buildcache
          cache-to: type=registry,ref=${{ secrets.DOCKER_HUB_USERNAME }}/stock-bot:buildcache,mode=max

  Deploy:
    needs: Build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout 程式碼
        uses: actions/checkout@v4

      - name: 執行遠端 SSH 指令
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.HOST_DNS }}
          username: ${{ secrets.USERNAME }}
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            echo "檢查並清理 3000 埠口的容器..."
            CONTAINERS_USING_PORT=$(sudo docker ps -q --filter "publish=3000")
            if [ ! -z "$CONTAINERS_USING_PORT" ]; then
              echo "停止使用 3000 埠口的容器..."
              sudo docker stop $CONTAINERS_USING_PORT
              sudo docker rm $CONTAINERS_USING_PORT
            fi

            echo "使用 docker-compose 拉取最新映像檔並啟動容器..."
            sudo docker-compose --env-file .env down
            sudo docker-compose --env-file .env pull
            sudo docker-compose --env-file .env up -d

            echo "驗證容器狀態..."
            if ! sudo docker ps | grep -q "stock-bot"; then
              echo "容器啟動失敗"
              sudo docker-compose logs
              exit 1
            fi

            echo "容器成功啟動"
            sudo docker ps | grep "stock-bot"
            
            echo "清除未使用的映像檔..."
            sudo docker image prune -f || echo "清除未使用的映像檔失敗"