name: Deploy to EC2

on:
  push:
    branches:
      - feature/測試CICD

jobs:
  Build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '22.x'

      - name: Install dependencies
        run: npm install

      - name: Build NestJS app
        run: npm run build

  Deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Create artifacts directory
        run: mkdir -p artifacts

      - name: Copy Docker and config files to artifacts
        run: |
          cp docker-compose.yml artifacts/
          cp dockerfile artifacts/
          cp -r prisma/ artifacts/ || echo "No prisma directory"
          cp package.json artifacts/
          cp package-lock.json artifacts/ || echo "No package-lock.json"

      - name: Upload artifacts to EC2
        uses: appleboy/scp-action@master
        with:
          host: ${{ secrets.HOST_DNS }}
          username: ${{ secrets.USERNAME }}
          key: ${{ secrets.EC2_SSH_KEY }}
          source: "artifacts/*"
          target: "~/"
          strip_components: 1

      - name: Execute remote SSH commands
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.HOST_DNS }}
          username: ${{ secrets.USERNAME }}
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            echo "Creating .env file..."
            cat > ~/.env << EOL
            DB_USER='${{ secrets.DB_USER }}'
            DB_PASSWORD='${{ secrets.DB_PASSWORD }}'
            DB_NAME='stock_bot'
            CHANNEL_ACCESS_TOKEN='${{ secrets.CHANNEL_ACCESS_TOKEN }}'
            CHANNEL_SECRET='${{ secrets.CHANNEL_SECRET }}'
            TELEGRAM_BOT_TOKEN='${{ secrets.TELEGRAM_BOT_TOKEN }}'
            TELEGRAM_BOT_WEBHOOK_DOMAIN='${{ secrets.TELEGRAM_BOT_WEBHOOK_DOMAIN }}'
            TELEGRAM_BOT_WEBHOOK_PATH='${{ secrets.TELEGRAM_BOT_WEBHOOK_PATH }}'
            TELEGRAM_BOT_SECRET_TOKEN='${{ secrets.TELEGRAM_BOT_SECRET_TOKEN }}'
            IMGUR_CLIENT_ID='${{ secrets.IMGUR_CLIENT_ID }}'
            EOL

            echo "Checking and cleaning up port 3000..."
            CONTAINERS_USING_PORT=$(sudo docker ps -q --filter "publish=3000")
            if [ ! -z "$CONTAINERS_USING_PORT" ]; then
              echo "Stopping containers using port 3000..."
              sudo docker stop $CONTAINERS_USING_PORT
              sudo docker rm $CONTAINERS_USING_PORT
            fi

            echo "Building and starting containers with docker-compose..."
            cd ~/artifacts
            sudo docker-compose --env-file ~/.env down
            sudo docker-compose --env-file ~/.env build
            sudo docker-compose --env-file ~/.env up -d

            echo "Verifying container status..."
            if ! sudo docker ps | grep -q "stock-bot-api"; then
              echo "Container failed to start"
              sudo docker-compose logs
              exit 1
            fi

            echo "Containers successfully started"
            sudo docker ps | grep "stock-bot"
            
            echo "Cleaning up unused images..."
            sudo docker image prune -f || echo "Failed to prune unused images"